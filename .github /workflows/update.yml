name: Aggiorna dati AZIONARIO

on:
  schedule:
    - cron: '30 6 * * 1-5'   # 08:30 CET/CEST circa, lun-ven
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa dipendenze
        run: pip install -r requirements.txt

      - name: Esegui fetch e calcolo indicatori
        run: python fetch_azionario.py

      - name: Commit e push dei dati aggiornati
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add azionario.json data/ regole/
          git diff --staged --quiet || git commit -m "Aggiornamento dati automatico $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
